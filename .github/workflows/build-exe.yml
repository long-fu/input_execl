name: Build Windows EXE

on:
  push:
    branches: [master, feat/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name excel_input --add-data "core;core" --add-data "ui;ui" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: excel_input-windows
          path: dist/excel_input.exe
